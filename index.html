<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhanced Personal YouTube Library</title>

<link rel="preconnect" href="https://www.youtube-nocookie.com">
<link rel="dns-prefetch" href="//i.ytimg.com">

<style>
:root {
  --bg: #0d0d0d;
  --card-bg: #1a1a1a;
  --card-hover: #242424;
  --text: #e0e0e0;
  --text-muted: #aaaaaa;
  --accent: #ff3333;
  --radius: 16px;
  --transition: 0.25s ease;
  --card-min-width: 460px;
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, Arial, sans-serif;
}

header {
  padding: 24px 16px;
  text-align: center;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 10;
}

h1 {
  margin: 0 0 16px;
}

#search {
  width: 90%;
  max-width: 600px;
  padding: 14px 20px;
  border-radius: 999px;
  border: none;
  outline: none;
  background: #222;
  color: white;
  font-size: 1rem;
}

#search:focus {
  box-shadow: 0 0 0 3px var(--accent);
}

#videoCount {
  margin-top: 10px;
  color: var(--text-muted);
}

.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(var(--card-min-width), 1fr));
  gap: 28px;
  padding: 28px;
}

.video-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.45);
  transition: var(--transition);
}

.video-card:hover {
  transform: translateY(-8px);
  background: var(--card-hover);
}

.thumbnail-container {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: black;
  cursor: pointer;
}

.thumbnail-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.play-icon {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.15)),
    url("https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_play_button_icon_(2013â€“2017).svg")
    center / 80px no-repeat;
}

.video-info {
  padding: 16px 18px;
}

.video-info h3 {
  margin: 0;
  font-size: 1rem;
  line-height: 1.35;
}

.player-container {
  width: 100%;
  aspect-ratio: 16 / 9;
}

.player-container iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header>
  <h1>Personal YouTube Library</h1>
  <input id="search" placeholder="Search by title..." autocomplete="off">
  <p id="videoCount"></p>
</header>

<div id="videoGrid" class="video-grid"></div>

<script>
const videos = [
  { id: "VzDAPJNtAQk", title: "literally who asked for this?" },
  { id: "RwSS7uuVrPU", title: "Unforgiven - Analysing The Greatest Western Ever Made" },
  { id: "pdrGJjFAw2Q", title: "This changes everything." },
  { id: "KAPEJRDlyWw", title: "Hasan Just F**ked Up Super Bad…" },
  { id: "St3qla89Fw8", title: "Who is the Most POWERFUL Dragon in How To Train Your Dragon?" },
  { id: "1xBrxWzKzDQ", title: "The Biology of Subnautica | Full Documentary" },
  { id: "Seu7V91vxAo", title: "The 'Biology' of Horizon Zero Dawn" },
  { id: "8d9_TA1hi9w", title: "'Biology' of Horizon: Zero Dawn | Part II" },
  { id: "lLWE5328LPs", title: "The Biology of Monster Hunter Wilds | Full Documentary" },
  { id: "uydvCGStqEo", title: "Can My Viewers Count to 10 Before I Beat Zelda?" },
  { id: "jGnDdrrstMY", title: "For my 30 year old cousin (who's never played Minecraft)" },
  { id: "PYivaEpS5_k", title: "Who Will Rule North Korea Next?" },
  { id: "7p5sDTjkug4", title: "Vampire Crawlers Challenged Me To Break The Game..." },
  { id: "Bp4BZiszJ3M", title: "I'm Never Bringing Her On Stream Again..." },
  { id: "qVAKiO2Lr6Q", title: "New Video 1" },
  { id: "rJLuZR_uAm0", title: "New Video 2" },
  { id: "rbxYShsMp6c", title: "New Video 3" },
  { id: "MT6UeNf4IEk", title: "New Video 4" },

  { id: "FkDvDkdid_w", title: "New Video 5" },
  { id: "CugH4jj0iG4", title: "New Video 6" },
  { id: "JO5WJR2yY-U", title: "New Video 7" },
  { id: "IawF_J1LvBo", title: "New Video 8" },
  { id: "jT_IgAy2-yw", title: "New Video 9" },
  { id: "-XNPBlyP-3w", title: "New Video 10" },
  { id: "BPdTPFqKQM0", title: "Who Will Rule North Korea Next?" },
  { id: "lCW5YRY621M", title: "Who Will Rule North Korea Next?" },
  { id: "ijaVLwA9rpw", title: "Who Will Rule North Korea Next?" },
  { id: "pvzQqsqqWfI", title: "Who Will Rule North Korea Next?" },
  { id: "Me7JfvfYIQo", title: "Who Will Rule North Korea Next?" },
  { id: "PNMSaxI-Xts", title: "Who Will Rule North Korea Next?" },
  { id: "GV5pVM0Wxco", title: "Who Will Rule North Korea Next?" },
  { id: "IrC4pf5in54", title: "Who Will Rule North Korea Next?" },
  { id: "AIOFNWoxexs", title: "Who Will Rule North Korea Next?" },
  { id: "jixf_daLbMo", title: "Who Will Rule North Korea Next?" },

];

const grid = document.getElementById("videoGrid");
const search = document.getElementById("search");
const count = document.getElementById("videoCount");

function createCard(video) {
  const card = document.createElement("div");
  card.className = "video-card";

  card.innerHTML = `
    <div class="thumbnail-container">
      <img src="https://i.ytimg.com/vi/${video.id}/maxresdefault.jpg"
           onerror="this.src='https://i.ytimg.com/vi/${video.id}/hqdefault.jpg'">
      <div class="play-icon"></div>
    </div>

    <div class="video-info">
      <h3>${video.title}</h3>
    </div>

    <div class="player-container hidden">
      <iframe
        data-src="https://www.youtube-nocookie.com/embed/${video.id}?autoplay=1&rel=0"
        allow="autoplay; encrypted-media"
        allowfullscreen>
      </iframe>
    </div>
  `;

  card.querySelector(".thumbnail-container").onclick = () => {
    const player = card.querySelector(".player-container");
    const iframe = player.querySelector("iframe");
    iframe.src = iframe.dataset.src;
    player.classList.remove("hidden");
    card.querySelector(".thumbnail-container").remove();
  };

  return card;
}

function render(list) {
  grid.innerHTML = "";
  list.forEach(v => grid.appendChild(createCard(v)));
  count.textContent = `${list.length} video${list.length !== 1 ? "s" : ""} displayed`;
}

search.oninput = () => {
  const t = search.value.toLowerCase();
  render(videos.filter(v => v.title.toLowerCase().includes(t)));
};

render(videos);
</script>

</body>
</html>
